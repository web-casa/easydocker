name: OS Compatibility CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  docker-os-matrix:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Docker Version
        run: docker version

      - name: Run OS Matrix Tests
        run: bash tests/run_os_matrix.sh
